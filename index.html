<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>もじさがしクエスト - 47都道府県編</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Kiwi+Maru:wght@500&display=swap');

        :root {
            --primary: #818cf8;
            --bg: #0f172a;
        }

        body {
            font-family: 'Kiwi Maru', serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pixel-font {
            font-family: 'DotGothic16', sans-serif;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1rem;
        }

        .grid-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }

        .grid-cell.selected {
            background: #6366f1;
            color: white;
            transform: scale(0.9);
        }

        .grid-cell.found {
            background: #059669;
            color: white;
            border-color: #10b981;
            animation: pulse 0.5s ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .axis-label {
            color: #6366f1;
            font-weight: bold;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
        }

        .word-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .word-card.found {
            background: #064e3b;
            border-color: #10b981;
            color: #34d399;
        }

        .word-card.hidden {
            color: #475569;
            letter-spacing: 2px;
        }

        .floating-message {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(99, 102, 241, 0.95);
            padding: 20px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .stream-info {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 10px;
            padding: 8px;
            font-size: 0.8rem;
            text-align: center;
            border: 1px dashed #6366f1;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="text-center pt-1">
            <h1 class="text-2xl font-bold text-indigo-400 pixel-font tracking-widest uppercase">Prefecture Search</h1>
            <div id="theme-display" class="text-sm text-yellow-400 font-bold mt-1">テーマ: 47都道府県</div>
        </header>

        <!-- Word List (Hidden mode) -->
        <div class="bg-slate-800/50 p-2 rounded-xl">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-bold text-slate-400 px-2 uppercase tracking-tighter">見つける県名 (残り <span id="remaining-count">0</span>)</span>
            </div>
            <div id="word-list" class="grid grid-cols-3 gap-1">
                <!-- Word cards -->
            </div>
        </div>

        <!-- Main Game Board -->
        <div class="flex-grow flex items-center justify-center overflow-hidden">
            <div class="w-full bg-slate-900 p-1 rounded-lg border-2 border-slate-700 shadow-xl overflow-hidden">
                <div id="game-container" class="grid gap-0.5" style="grid-template-columns: 25px repeat(10, 1fr);">
                    <!-- Grid generated here -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="pb-2 flex flex-col gap-2">
            <div class="stream-info text-indigo-200">
                隠れた都道府県を予想してコメントしてね！
            </div>
            <button onclick="initGame()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold transition shadow-lg text-sm">
                次の都道府県へ
            </button>
        </footer>
    </div>

    <div id="toast" class="floating-message pixel-font animate-bounce"></div>

    <script>
        const GRID_SIZE = 10;
        
        // 47都道府県データ（カタカナ表記）
        const PREFECTURES = [
            'ホッカイドウ', 'アオモリ', 'イワテ', 'ミヤギ', 'アキタ', 'ヤマガタ', 'フクシマ',
            'イバラキ', 'トチギ', 'グンマ', 'サイタマ', 'チバ', 'トウキョウ', 'カナガワ',
            'ニイガタ', 'トヤマ', 'イシカワ', 'フクイ', 'ヤマナシ', 'ナガノ', 'ギフ', 'シズオカ', 'アイチ',
            'ミエ', 'シガ', 'キョウト', 'オオサカ', 'ヒョウゴ', 'ナラ', 'ワカヤマ',
            'トットリ', 'シマネ', 'オカヤマ', 'ヒロシマ', 'ヤマグチ',
            'トクシマ', 'カガワ', 'エヒメ', 'コウチ',
            'フクオカ', 'サガ', 'ナガサキ', 'クマモト', 'オオイタ', 'ミヤザキ', 'カゴシマ', 'オキナワ'
        ];

        let grid = [];
        let wordsToFind = [];
        let foundWords = [];
        let isSelecting = false;
        let selectionStart = null;
        let selectedCells = [];

        function initGame() {
            // 47の中からランダムに6つを選択
            wordsToFind = [...PREFECTURES].sort(() => Math.random() - 0.5).slice(0, 6);
            foundWords = [];
            
            createGrid();
            placeWords();
            fillEmptyCells();
            renderGrid();
            updateUI();
        }

        function createGrid() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(''));
        }

        function placeWords() {
            wordsToFind.forEach(word => {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 200) {
                    // 縦、横、斜めの全方向
                    const directions = [{x: 1, y: 0}, {x: 0, y: 1}, {x: 1, y: 1}, {x: 1, y: -1}];
                    const dir = directions[Math.floor(Math.random() * directions.length)];
                    
                    // 開始位置の制約を計算
                    let startX, startY;
                    if (dir.x === 1) startX = Math.floor(Math.random() * (GRID_SIZE - word.length));
                    else startX = Math.floor(Math.random() * GRID_SIZE);

                    if (dir.y === 1) startY = Math.floor(Math.random() * (GRID_SIZE - word.length));
                    else if (dir.y === -1) startY = Math.floor(Math.random() * (GRID_SIZE - word.length)) + (word.length - 1);
                    else startY = Math.floor(Math.random() * GRID_SIZE);
                    
                    if (canPlace(word, startX, startY, dir)) {
                        for (let i = 0; i < word.length; i++) {
                            grid[startY + (i * dir.y)][startX + (i * dir.x)] = {
                                char: word[i],
                                isWord: true
                            };
                        }
                        placed = true;
                    }
                    attempts++;
                }
            });
        }

        function canPlace(word, startX, startY, dir) {
            for (let i = 0; i < word.length; i++) {
                const nx = startX + (i * dir.x);
                const ny = startY + (i * dir.y);
                if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) return false;
                const cell = grid[ny][nx];
                if (cell !== '' && cell.char !== word[i]) return false;
            }
            return true;
        }

        function fillEmptyCells() {
            const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン';
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (grid[y][x] === '') {
                        grid[y][x] = { char: chars[Math.floor(Math.random() * chars.length)], isWord: false };
                    }
                }
            }
        }

        function renderGrid() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';

            container.appendChild(createLabel(''));
            for (let i = 0; i < GRID_SIZE; i++) {
                container.appendChild(createLabel(String.fromCharCode(65 + i)));
            }

            for (let y = 0; y < GRID_SIZE; y++) {
                container.appendChild(createLabel(y + 1));
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'grid-cell rounded-sm';
                    cellEl.textContent = grid[y][x].char;
                    cellEl.dataset.x = x;
                    cellEl.dataset.y = y;

                    cellEl.addEventListener('mousedown', startSelection);
                    cellEl.addEventListener('mouseenter', updateSelection);
                    cellEl.addEventListener('touchstart', (e) => { e.preventDefault(); startSelection(e); }, {passive: false});

                    container.appendChild(cellEl);
                }
            }
        }

        function createLabel(text) {
            const el = document.createElement('div');
            el.className = 'axis-label';
            el.textContent = text;
            return el;
        }

        function updateUI() {
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            
            wordsToFind.forEach(word => {
                const isFound = foundWords.includes(word);
                const el = document.createElement('div');
                el.className = `word-card text-[11px] ${isFound ? 'found' : 'hidden'}`;
                el.textContent = isFound ? word : '？？？';
                list.appendChild(el);
            });

            document.getElementById('remaining-count').textContent = wordsToFind.length - foundWords.length;
        }

        function startSelection(e) {
            isSelecting = true;
            let target = e.target;
            if (e.touches) {
                target = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
            }
            if (!target || !target.classList.contains('grid-cell')) return;
            
            selectionStart = { x: parseInt(target.dataset.x), y: parseInt(target.dataset.y) };
            clearSelection();
            target.classList.add('selected');
            selectedCells = [target];
        }

        function updateSelection(e) {
            if (!isSelecting) return;
            let target = e.target;
            if (e.touches) {
                target = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
            }
            if (!target || !target.classList.contains('grid-cell')) return;

            const current = { x: parseInt(target.dataset.x), y: parseInt(target.dataset.y) };

            const dx = Math.abs(current.x - selectionStart.x);
            const dy = Math.abs(current.y - selectionStart.y);

            if (dx === 0 || dy === 0 || dx === dy) {
                clearSelection();
                const cells = document.querySelectorAll('.grid-cell');
                selectedCells = [];

                const steps = Math.max(dx, dy);
                const stepX = dx === 0 ? 0 : (current.x > selectionStart.x ? 1 : -1);
                const stepY = dy === 0 ? 0 : (current.y > selectionStart.y ? 1 : -1);

                for (let i = 0; i <= steps; i++) {
                    const cx = selectionStart.x + (i * stepX);
                    const cy = selectionStart.y + (i * stepY);
                    const foundCell = Array.from(cells).find(c => parseInt(c.dataset.x) === cx && parseInt(c.dataset.y) === cy);
                    if (foundCell) {
                        foundCell.classList.add('selected');
                        selectedCells.push(foundCell);
                    }
                }
            }
        }

        document.addEventListener('touchmove', (e) => {
            if (isSelecting) {
                e.preventDefault();
                updateSelection(e);
            }
        }, { passive: false });

        function endSelection() {
            if (!isSelecting) return;
            isSelecting = false;

            const selectedWord = selectedCells.map(c => c.textContent).join('');
            const reversedWord = selectedWord.split('').reverse().join('');

            const foundOne = checkWord(selectedWord) || checkWord(reversedWord);
            
            if (!foundOne) {
                clearSelection();
            }
        }

        function checkWord(wordStr) {
            if (wordsToFind.includes(wordStr) && !foundWords.includes(wordStr)) {
                foundWords.push(wordStr);
                
                selectedCells.forEach(cell => {
                    cell.classList.remove('selected');
                    cell.classList.add('found');
                });

                showToast(`正解！「${wordStr}」`);
                updateUI();

                if (foundWords.length === wordsToFind.length) {
                    setTimeout(() => showToast("🎉 ALL PREFECTURES FOUND! 🎉"), 500);
                }
                return true;
            }
            return false;
        }

        function clearSelection() {
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('selected'));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }

        window.addEventListener('mouseup', endSelection);
        window.addEventListener('touchend', endSelection);
        window.onload = initGame;
    </script>
</body>
</html>
