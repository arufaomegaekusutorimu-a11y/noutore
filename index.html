<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>もじさがしクエスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Kiwi+Maru:wght@500&display=swap');

        :root {
            --primary: #818cf8;
            --bg: #0f172a;
        }

        body {
            font-family: 'Kiwi Maru', serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pixel-font {
            font-family: 'DotGothic16', sans-serif;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            gap: 1rem;
        }

        /* 進行状況メモリのスタイル */
        .progress-meter {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        .meter-unit {
            width: 40px;
            height: 12px;
            background: #1e293b;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #334155;
        }

        .meter-unit.active {
            background: #818cf8;
            box-shadow: 0 0 15px #818cf8;
            border-color: #a5b4fc;
            transform: scaleY(1.1);
        }

        .grid-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 1.25rem;
            font-weight: bold;
            transition: all 0.3s;
            user-select: none;
        }

        .grid-cell.found {
            background: #059669;
            color: white;
            border-color: #10b981;
            animation: pulse 0.5s ease-out;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .floating-message {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(99, 102, 241, 0.95);
            padding: 20px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .input-area {
            background: #1e293b;
            border: 2px solid #6366f1;
            padding: 12px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        input[type="text"] {
            background: transparent;
            border-bottom: 2px solid #475569;
            flex-grow: 1;
            padding: 4px 8px;
            color: white;
            outline: none;
            font-size: 1.2rem;
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* テキストサイズを盤面の幅に合わせて調整 */
        .banner-text {
            width: 100%;
            font-size: clamp(1rem, 6.5vw, 1.85rem); /* 画面幅に応じて可変 */
            white-space: nowrap;
            text-align: center;
            font-weight: bold;
            color: white;
            margin-top: 0.5rem;
            letter-spacing: -0.05em;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="text-center">
            <!-- 進捗メモリ -->
            <div id="progress-meter" class="progress-meter mt-4">
                <div class="meter-unit"></div>
                <div class="meter-unit"></div>
                <div class="meter-unit"></div>
                <div class="meter-unit"></div>
                <div class="meter-unit"></div>
                <div class="meter-unit"></div>
            </div>
            <div class="text-lg text-yellow-400 font-bold mt-2 pixel-font">レベル <span id="level-number">1</span></div>
            
            <!-- メインテキスト -->
            <div class="banner-text uppercase">都道府県を探してコメントしよう</div>
            <!-- サブテキスト：メインと同じスタイル -->
            <div class="banner-text uppercase">初見さん大歓迎</div>
        </header>

        <div class="flex-grow flex items-center justify-center overflow-hidden py-4">
            <div class="w-full bg-slate-900 p-1.5 rounded-xl border-2 border-slate-700 shadow-2xl">
                <div id="game-container" class="grid gap-0.5" style="grid-template-columns: repeat(10, 1fr);">
                    <!-- Grid -->
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="answer-input" placeholder="県名を入力" autocomplete="off">
            <button onclick="handleAnswerSubmit()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl font-bold transition text-sm shadow-lg">
                回答
            </button>
        </div>

        <div class="text-center text-[11px] text-slate-500 mt-2">
            盤面に隠れた県名を6つ見つけるとクリアです
        </div>
    </div>

    <div id="toast" class="floating-message pixel-font animate-bounce"></div>

    <script>
        const GRID_SIZE = 10;
        const TARGET_COUNT = 6;
        
        const ALL_PREFECTURES = [
            'ホッカイドウ', 'アオモリ', 'イワテ', 'ミヤギ', 'アキタ', 'ヤマガタ', 'フクシマ',
            'イバラキ', 'トチギ', 'グンマ', 'サイタマ', 'チバ', 'トウキョウ', 'カナガワ',
            'ニイガタ', 'トヤマ', 'イシカワ', 'フクイ', 'ヤマナシ', 'ナガノ', 'ギフ', 'シズオカ', 'アイチ',
            'ミエ', 'シガ', 'キョウト', 'オオサカ', 'ヒョウゴ', 'ナラ', 'ワカヤマ',
            'トットリ', 'シマネ', 'オカヤマ', 'ヒロシマ', 'ヤマグチ',
            'トクシマ', 'カガワ', 'エヒメ', 'コウチ',
            'フクオカ', 'サガ', 'ナガサキ', 'クマモト', 'オオイタ', 'ミヤザキ', 'カゴシマ', 'オキナワ'
        ];

        // 8方向の定義
        const DIRECTIONS = [
            {x: 1, y: 0},   // 右
            {x: 0, y: 1},   // 下
            {x: 1, y: 1},   // 右下
            {x: -1, y: 1},  // 左下
            {x: -1, y: 0},  // 左
            {x: 0, y: -1},  // 上
            {x: -1, y: -1}, // 左上
            {x: 1, y: -1}   // 右上
        ];

        let grid = [];
        let hiddenWords = []; 
        let allFoundWords = []; 
        let currentLevel = 1;
        let isTransitioning = false;

        function normalizeInput(str) {
            if (!str) return "";
            let val = str.trim();
            val = val.replace(/[ぁ-ん]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) + 0x60);
            });
            return val;
        }

        function initGame(nextLevel = false) {
            if (nextLevel) currentLevel++;
            document.getElementById('level-number').textContent = currentLevel;
            
            hiddenWords = [...ALL_PREFECTURES].sort(() => Math.random() - 0.5).slice(0, TARGET_COUNT);
            allFoundWords = [];
            isTransitioning = false;
            
            createGrid();
            placeInitialWords();
            fillEmptyCells();
            renderGrid();
            updateUI();
            
            const input = document.getElementById('answer-input');
            input.value = '';
            input.focus();
        }

        function createGrid() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(''));
        }

        function placeInitialWords() {
            hiddenWords.forEach(word => {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 1000) {
                    const dir = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
                    const startX = Math.floor(Math.random() * GRID_SIZE);
                    const startY = Math.floor(Math.random() * GRID_SIZE);
                    
                    if (canPlace(word, startX, startY, dir)) {
                        for (let i = 0; i < word.length; i++) {
                            grid[startY + (i * dir.y)][startX + (i * dir.x)] = word[i];
                        }
                        placed = true;
                    }
                    attempts++;
                }
            });
        }

        function canPlace(word, startX, startY, dir) {
            for (let i = 0; i < word.length; i++) {
                const nx = startX + (i * dir.x);
                const ny = startY + (i * dir.y);
                if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) return false;
                if (grid[ny][nx] !== '' && grid[ny][nx] !== word[i]) return false;
            }
            return true;
        }

        function fillEmptyCells() {
            const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン';
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (grid[y][x] === '') {
                        grid[y][x] = chars[Math.floor(Math.random() * chars.length)];
                    }
                }
            }
        }

        function renderGrid() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'grid-cell rounded-sm';
                    cellEl.textContent = grid[y][x];
                    cellEl.id = `cell-${x}-${y}`;
                    container.appendChild(cellEl);
                }
            }
        }

        function updateUI() {
            const meters = document.querySelectorAll('.meter-unit');
            meters.forEach((m, index) => {
                if (index < allFoundWords.length) {
                    m.classList.add('active');
                } else {
                    m.classList.remove('active');
                }
            });
        }

        function findWordOnGrid(word) {
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    for (const dir of DIRECTIONS) {
                        let match = true;
                        let coords = [];
                        for (let i = 0; i < word.length; i++) {
                            const nx = x + (i * dir.x);
                            const ny = y + (i * dir.y);
                            if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE || grid[ny][nx] !== word[i]) {
                                match = false;
                                break;
                            }
                            coords.push({x: nx, y: ny});
                        }
                        if (match) return coords;
                    }
                }
            }
            return null;
        }

        function handleAnswerSubmit() {
            if (isTransitioning) return;
            const input = document.getElementById('answer-input');
            const answer = normalizeInput(input.value);
            
            if (!answer) return;

            if (allFoundWords.includes(answer)) {
                showToast("もう見つけています！");
                input.value = '';
                return;
            }

            if (!ALL_PREFECTURES.includes(answer)) {
                triggerError(input);
                return;
            }

            const coords = findWordOnGrid(answer);
            if (coords) {
                allFoundWords.push(answer);
                coords.forEach(loc => {
                    const cell = document.getElementById(`cell-${loc.x}-${loc.y}`);
                    if (cell) cell.classList.add('found');
                });

                showToast(`正解！「${answer}」`);
                updateUI();
                input.value = '';

                if (allFoundWords.length >= TARGET_COUNT) {
                    isTransitioning = true;
                    setTimeout(() => {
                        showToast("🎉 LEVEL CLEAR! 🎉");
                        setTimeout(() => {
                            initGame(true);
                        }, 2000);
                    }, 500);
                }
            } else {
                triggerError(input);
            }
        }

        function triggerError(input) {
            input.parentElement.classList.add('shake');
            setTimeout(() => input.parentElement.classList.remove('shake'), 500);
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAnswerSubmit();
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }

        window.onload = () => initGame();
    </script>
</body>
</html>
