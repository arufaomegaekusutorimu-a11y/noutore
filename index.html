<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>もじさがしクエスト - 入力回答編</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Kiwi+Maru:wght@500&display=swap');

        :root {
            --primary: #818cf8;
            --bg: #0f172a;
        }

        body {
            font-family: 'Kiwi Maru', serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pixel-font {
            font-family: 'DotGothic16', sans-serif;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1rem;
        }

        .grid-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 1.25rem;
            font-weight: bold;
            transition: all 0.3s;
            user-select: none;
        }

        .grid-cell.found {
            background: #059669;
            color: white;
            border-color: #10b981;
            animation: pulse 0.5s ease-out;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .word-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .word-card.found {
            background: #064e3b;
            border-color: #10b981;
            color: #34d399;
        }

        .word-card.hidden {
            color: #475569;
            letter-spacing: 2px;
        }

        .floating-message {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(99, 102, 241, 0.95);
            padding: 20px 30px;
            border-radius: 50px;
            font-size: 1.5rem;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .input-area {
            background: #1e293b;
            border: 2px solid #6366f1;
            padding: 12px;
            border-radius: 16px;
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            background: transparent;
            border-bottom: 2px solid #475569;
            flex-grow: 1;
            padding: 4px 8px;
            color: white;
            outline: none;
            font-size: 1.2rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #818cf8;
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="text-center pt-1">
            <h1 class="text-2xl font-bold text-indigo-400 pixel-font tracking-widest uppercase">Prefecture Search</h1>
            <div id="theme-display" class="text-sm text-yellow-400 font-bold mt-1">テーマ: 47都道府県</div>
        </header>

        <!-- Word List -->
        <div class="bg-slate-800/50 p-2 rounded-xl">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-bold text-slate-400 px-2 uppercase tracking-tighter">見つける県名 (残り <span id="remaining-count">0</span>)</span>
            </div>
            <div id="word-list" class="grid grid-cols-3 gap-1">
                <!-- Word cards -->
            </div>
        </div>

        <!-- Main Game Board -->
        <div class="flex-grow flex items-center justify-center overflow-hidden">
            <div class="w-full bg-slate-900 p-1 rounded-lg border-2 border-slate-700 shadow-xl overflow-hidden">
                <!-- ラベルを削除し、グリッドのみを表示 -->
                <div id="game-container" class="grid gap-0.5" style="grid-template-columns: repeat(10, 1fr);">
                    <!-- Grid generated here -->
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area mb-2">
            <input type="text" id="answer-input" placeholder="県名を入力（ひらがなOK）" autocomplete="off">
            <button onclick="handleAnswerSubmit()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg font-bold transition">
                回答
            </button>
        </div>

        <!-- Footer -->
        <footer class="pb-2 flex flex-col gap-2">
            <button onclick="initGame()" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-bold transition shadow-lg text-sm">
                新しい問題へ
            </button>
        </footer>
    </div>

    <div id="toast" class="floating-message pixel-font animate-bounce"></div>

    <script>
        const GRID_SIZE = 10;
        
        const PREFECTURES = [
            'ホッカイドウ', 'アオモリ', 'イワテ', 'ミヤギ', 'アキタ', 'ヤマガタ', 'フクシマ',
            'イバラキ', 'トチギ', 'グンマ', 'サイタマ', 'チバ', 'トウキョウ', 'カナガワ',
            'ニイガタ', 'トヤマ', 'イシカワ', 'フクイ', 'ヤマナシ', 'ナガノ', 'ギフ', 'シズオカ', 'アイチ',
            'ミエ', 'シガ', 'キョウト', 'オオサカ', 'ヒョウゴ', 'ナラ', 'ワカヤマ',
            'トットリ', 'シマネ', 'オカヤマ', 'ヒロシマ', 'ヤマグチ',
            'トクシマ', 'カガワ', 'エヒメ', 'コウチ',
            'フクオカ', 'サガ', 'ナガサキ', 'クマモト', 'オオイタ', 'ミヤザキ', 'カゴシマ', 'オキナワ'
        ];

        let grid = [];
        let wordLocations = {};
        let wordsToFind = [];
        let foundWords = [];

        // ひらがなをカタカナに変換する関数
        function toKatakana(str) {
            return str.replace(/[ぁ-ん]/g, function(s) {
                return String.fromCharCode(s.charCodeAt(0) + 0x60);
            });
        }

        function initGame() {
            wordsToFind = [...PREFECTURES].sort(() => Math.random() - 0.5).slice(0, 6);
            foundWords = [];
            wordLocations = {};
            
            createGrid();
            placeWords();
            fillEmptyCells();
            renderGrid();
            updateUI();
            
            const input = document.getElementById('answer-input');
            input.value = '';
            input.focus();
        }

        function createGrid() {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(''));
        }

        function placeWords() {
            wordsToFind.forEach(word => {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 200) {
                    const directions = [{x: 1, y: 0}, {x: 0, y: 1}, {x: 1, y: 1}, {x: 1, y: -1}];
                    const dir = directions[Math.floor(Math.random() * directions.length)];
                    
                    let startX, startY;
                    if (dir.x === 1) startX = Math.floor(Math.random() * (GRID_SIZE - word.length));
                    else startX = Math.floor(Math.random() * GRID_SIZE);

                    if (dir.y === 1) startY = Math.floor(Math.random() * (GRID_SIZE - word.length));
                    else if (dir.y === -1) startY = Math.floor(Math.random() * (GRID_SIZE - word.length)) + (word.length - 1);
                    else startY = Math.floor(Math.random() * GRID_SIZE);
                    
                    if (canPlace(word, startX, startY, dir)) {
                        let locations = [];
                        for (let i = 0; i < word.length; i++) {
                            const nx = startX + (i * dir.x);
                            const ny = startY + (i * dir.y);
                            grid[ny][nx] = {
                                char: word[i],
                                isWord: true
                            };
                            locations.push({x: nx, y: ny});
                        }
                        wordLocations[word] = locations;
                        placed = true;
                    }
                    attempts++;
                }
            });
        }

        function canPlace(word, startX, startY, dir) {
            for (let i = 0; i < word.length; i++) {
                const nx = startX + (i * dir.x);
                const ny = startY + (i * dir.y);
                if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) return false;
                const cell = grid[ny][nx];
                if (cell !== '' && cell.char !== word[i]) return false;
            }
            return true;
        }

        function fillEmptyCells() {
            const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン';
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if (grid[y][x] === '') {
                        grid[y][x] = { char: chars[Math.floor(Math.random() * chars.length)], isWord: false };
                    }
                }
            }
        }

        function renderGrid() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'grid-cell rounded-sm';
                    cellEl.textContent = grid[y][x].char;
                    cellEl.id = `cell-${x}-${y}`;
                    container.appendChild(cellEl);
                }
            }
        }

        function updateUI() {
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            
            wordsToFind.forEach(word => {
                const isFound = foundWords.includes(word);
                const el = document.createElement('div');
                el.className = `word-card text-[11px] ${isFound ? 'found' : 'hidden'}`;
                el.textContent = isFound ? word : '？？？';
                list.appendChild(el);
            });

            document.getElementById('remaining-count').textContent = wordsToFind.length - foundWords.length;
        }

        function handleAnswerSubmit() {
            const input = document.getElementById('answer-input');
            // 入力値をカタカナに変換して判定
            const answer = toKatakana(input.value.trim());
            
            if (wordsToFind.includes(answer) && !foundWords.includes(answer)) {
                foundWords.push(answer);
                
                const locations = wordLocations[answer];
                locations.forEach(loc => {
                    const cell = document.getElementById(`cell-${loc.x}-${loc.y}`);
                    if (cell) cell.classList.add('found');
                });

                showToast(`正解！「${answer}」`);
                updateUI();
                input.value = '';

                if (foundWords.length === wordsToFind.length) {
                    setTimeout(() => showToast("🎉 コンプリート！ 🎉"), 500);
                }
            } else {
                input.parentElement.classList.add('shake');
                setTimeout(() => input.parentElement.classList.remove('shake'), 500);
            }
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAnswerSubmit();
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }

        window.onload = initGame;
    </script>
</body>
</html>
